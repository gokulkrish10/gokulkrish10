name: Update README Day

on:
  schedule:
    - cron: "35 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-day:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update weekday
        run: node scripts/update-readme-day.mjs

      - name: Commit README update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update README weekday"
          file_pattern: README.md assets/profile-chat.svg
